name: "Cleanup GHCR Untagged Images"

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cleanup-ghcr-untagged
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      # Manifest-aware: untagged child/platform manifests referenced by a
      # tagged multi-arch/attested index are NOT treated as untagged, so
      # pruning untagged images cannot orphan a tag (V21). validate: true
      # post-checks multi-arch image integrity and fails the job on orphaning.
      - name: Delete untagged GHCR versions
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          owner: ${{ github.repository_owner }}
          package: ${{ github.event.repository.name }}
          delete-untagged: true
          validate: true
          token: ${{ secrets.TOKEN_GITHUB != '' && secrets.TOKEN_GITHUB || github.token }}
